<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Game</title>
  <link rel="stylesheet" href="simon.css">
</head>

<body>

<h1>Simon Game</h1>
<h2>Press any key to start the game</h2>

<div class="button-container">

  <div class="line-one">
    <div class="btn red" data-color="red">1</div>
    <div class="btn yellow" data-color="yellow">2</div>
  </div>

  <div class="line-two">
    <div class="btn pink" data-color="pink">3</div>
    <div class="btn purple" data-color="purple">4</div>
  </div>

</div>

<script src="simon.js"></script>

</body>
</html>
